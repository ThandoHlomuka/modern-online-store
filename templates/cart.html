{% extends "base.html" %}

{% block title %}Shopping Cart{% endblock %}

{% block content %}
<section class="cart-page">
    <div class="container">
        <div class="cart-container">
            <div class="cart-section">
                <h2 class="cart-title">🛒 Shopping Cart</h2>
                
                <div class="cart-items">
                    <!-- Cart items will be loaded dynamically -->
                </div>
            </div>
            
            <div class="cart-summary">
                <h3 class="summary-title">Order Summary</h3>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                
                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="shipping">FREE</span>
                </div>
                
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">$0.00</span>
                </div>
                
                <a href="/checkout" class="btn btn-gradient btn-block btn-lg mt-4" id="checkout-btn" style="opacity: 0.5; pointer-events: none;">
                    Proceed to Checkout →
                </a>
                
                <a href="/shop" class="btn btn-secondary btn-block mt-2" style="background: var(--light); color: var(--dark); border: none;">
                    Continue Shopping
                </a>
                
                <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--light);">
                    <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                        <span>🔒</span>
                        <span style="font-size: 0.9rem; color: var(--gray);">Secure checkout</span>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <span>↩️</span>
                        <span style="font-size: 0.9rem; color: var(--gray);">Free returns</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
// Load cart items on page load
document.addEventListener('DOMContentLoaded', async function() {
    await loadCart();
});

async function loadCart() {
    try {
        const response = await fetch('/api/cart');
        const data = await response.json();
        
        const cartItemsContainer = document.querySelector('.cart-items');
        
        if (data.items.length === 0) {
            cartItemsContainer.innerHTML = `
                <div class="empty-cart">
                    <div class="empty-cart-icon">🛒</div>
                    <h2>Your cart is empty</h2>
                    <p>Add some products to get started!</p>
                    <a href="/shop" class="btn btn-gradient">Continue Shopping</a>
                </div>
            `;
            document.getElementById('checkout-btn').style.display = 'none';
            return;
        }
        
        // Enable checkout button
        document.getElementById('checkout-btn').style.opacity = '1';
        document.getElementById('checkout-btn').style.pointerEvents = 'auto';
        
        // Render cart items
        cartItemsContainer.innerHTML = data.items.map(item => `
            <div class="cart-item" data-product-id="${item.id}">
                <div class="cart-item-image">
                    <img src="${item.image}" alt="${item.name}">
                </div>
                <div class="cart-item-details">
                    <h3>${item.name}</h3>
                    <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                </div>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="quantity-control">
                        <button class="quantity-btn" data-action="decrease" data-product-id="${item.id}">−</button>
                        <span class="quantity-display">${item.quantity}</span>
                        <button class="quantity-btn" data-action="increase" data-product-id="${item.id}">+</button>
                    </div>
                    <button class="remove-btn" data-product-id="${item.id}" title="Remove item">🗑</button>
                </div>
            </div>
        `).join('');
        
        // Update summary
        updateCartSummary(data);
        
        // Reinitialize event listeners
        initializeEventListeners();
    } catch (error) {
        console.error('Error loading cart:', error);
    }
}

function updateCartSummary(data) {
    const subtotal = data.total;
    const shipping = data.total > 100 ? 0 : 9.99;
    const total = subtotal + shipping;
    
    document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
    document.getElementById('shipping').textContent = shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2);
    document.getElementById('total').textContent = '$' + total.toFixed(2);
}
</script>
{% endblock %}
